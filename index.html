<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Literatura Hispanoamericana</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;1,400&family=Quicksand:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --deep-black: #020202;
            --soft-black: #0a0a0a;
            --rgb-speed: 1.5s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--deep-black);
            color: #ffffff;
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
            cursor: cell;
        }

        /* 1, 8. TÍTULOS RGB (SIN LA PALABRA PROYECTO) */
        .rgb-titulo {
            font-family: 'Cinzel Decorative', cursive;
            transition: color var(--rgb-speed) linear;
            text-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        /* 2. ESTRELLAS SEGUIDORAS */
        #star-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        /* 3, 9. DISEÑO CABECERA PROFESIONAL */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #111 0%, var(--deep-black) 100%);
            border-bottom: 1px solid #222;
        }

        .main-title {
            font-size: clamp(2rem, 10vw, 6rem);
            letter-spacing: 12px;
            margin-bottom: 10px;
        }

        .jorge-signature {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: var(--gold);
            letter-spacing: 5px;
            border-top: 1px solid var(--gold);
            padding-top: 15px;
            margin-top: 20px;
        }

        /* 4, 10. ZONAS Y RESPONSIVE */
        .archivo-contenedor {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 5%;
        }

        .seccion-label {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            color: var(--gold);
            text-align: center;
            margin-bottom: 60px;
            letter-spacing: 4px;
        }

        .grid-zonas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
        }

        .zona-card {
            background: var(--soft-black);
            border: 1px solid #1a1a1a;
            position: relative;
            overflow: hidden;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .zona-card:hover {
            transform: translateY(-20px);
            border-color: var(--gold);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
        }

        .zona-card img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.2);
            transition: 0.8s;
        }

        .zona-card:hover img {
            filter: grayscale(0%) contrast(1);
            transform: scale(1.1);
        }

        .card-desc {
            padding: 30px;
            text-align: center;
            background: linear-gradient(to top, var(--soft-black), transparent);
        }

        /* 6. MODAL (PORTAL DE INFORMACIÓN) */
        .portal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--deep-black);
            z-index: 10000;
            display: none;
            overflow-y: auto;
            padding: 60px 10%;
        }

        .portal-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .portal-texto h1 { font-family: 'Cinzel', serif; font-size: 3.5rem; margin-bottom: 25px; }
        .portal-texto p { font-family: 'Lora', serif; font-size: 1.4rem; line-height: 2; color: #ccc; }

        .btn-audio {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 20px 45px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }

        .btn-audio:hover { background: #fff; box-shadow: 0 0 25px #fff; }

        .btn-cerrar {
            position: fixed;
            top: 40px; right: 50px;
            color: #ff4444;
            font-size: 1.5rem;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            z-index: 11000;
        }

        @media (max-width: 900px) {
            .portal-layout { grid-template-columns: 1fr; }
            .portal-texto h1 { font-size: 2.2rem; }
            .btn-cerrar { right: 20px; top: 20px; }
        }
    </style>
</head>
<body>

    <canvas id="star-canvas"></canvas>

    <header>
        <h1 class="main-title rgb-titulo">Literatura Hispanoamericana</h1>
        <p class="jorge-signature">Creado por Jorge</p>
        <div style="margin-top: 40px; font-size: 0.7rem; color: #444; letter-spacing: 3px;">HAZ CLIC PARA DESBLOQUEAR EL AUDIO</div>
    </header>

    <main class="archivo-contenedor">
        <h2 class="seccion-label">ARCHIVO DE SERES Y CRÓNICAS</h2>
        
        <div class="grid-zonas" id="grid">
            </div>
    </main>

    <div id="portal" class="portal">
        <span class="btn-cerrar" onclick="cerrarPortal()">[ CERRAR ARCHIVO ]</span>
        <div class="portal-layout">
            <div class="portal-media">
                <img id="p-img" src="" style="width: 100%; border: 1px solid #333; box-shadow: 0 0 50px #000;">
            </div>
            <div class="portal-texto">
                <h1 id="p-title" class="rgb-titulo"></h1>
                <p id="p-info"></p>
                <button class="btn-audio" onclick="reproducirVoz()">
                    <span id="speaker-icon">🔊</span> INICIAR NARRACIÓN DE LA ZONA
                </button>
            </div>
        </div>
    </div>

    <iframe style="display:none" src="https://www.youtube.com/embed/P_NfP0-F_mU?autoplay=1&loop=1"></iframe>

    <script>
        // --- BASE DE DATOS EXTENSA (PARA QUE SEA LARGO) ---
        const BASE_DATOS = [
            {
                nombre: "El Mohán",
                info: "El Mohán es una de las figuras más enigmáticas de la literatura oral de los ríos. Se describe como un anciano de piel cobriza, largos cabellos y ojos que brillan como brasas. Habita en cuevas de cristal bajo el agua. En la literatura, representa el misterio de la naturaleza virgen y el guardián de los tesoros precolombinos. Suele atraer a los pescadores con el aroma de su tabaco eterno.",
                img: "https://images.unsplash.com/photo-1549880338-65ddcdfd017b?w=800"
            },
            {
                nombre: "La Llorona",
                info: "Es el espectro arquetípico de Hispanoamérica. Representa el dolor eterno y la culpa colectiva tras la tragedia. Su lamento a orillas del agua ha sido analizado por grandes escritores como símbolo de la identidad mestiza. Es un alma en pena que recorre los valles gritando por sus hijos perdidos, uniendo el horror con la compasión literaria.",
                img: "https://images.unsplash.com/photo-1509248961158-e54f6934749c?w=800"
            },
            {
                nombre: "La Patasola",
                info: "Habitante de las selvas más profundas. Es una mujer de una sola pierna que termina en pezuña. Es la gran protectora de la fauna y flora; castiga a los cazadores y a los taladores de árboles. En la narrativa hispana, simboliza la furia de la selva contra la profanación del hombre moderno.",
                img: "https://images.unsplash.com/photo-1440688807730-73e4e2169fb8?w=800"
            },
            {
                nombre: "El Sombrerón",
                info: "Personaje bohemio de la tradición mexicana y guatemalteca. Viste de negro con un sombrero gigantesco. Se dedica a trenzar las crines de los caballos y a enamorar a las jóvenes con serenatas de ultratumba. Representa el romanticismo trágico y los peligros de la noche en los pueblos coloniales.",
                img: "https://images.unsplash.com/photo-1501430654243-c934cec2e1c0?w=800"
            },
            {
                nombre: "La Madre Monte",
                info: "Giganta que viste de hojas y musgo. Gobierna sobre los vientos y las lluvias. Se dice que cuando ella se baña en los ríos, estos se desbordan. En la literatura regionalista, es la personificación absoluta de la Tierra como madre y juez de los actos humanos.",
                img: "https://images.unsplash.com/photo-1508197149814-0cc02e8b7f74?w=800"
            }
        ];

        // --- GENERADOR DE CONTENIDO ---
        const grid = document.getElementById('grid');
        BASE_DATOS.forEach(ser => {
            const card = document.createElement('div');
            card.className = 'zona-card';
            card.onclick = () => abrirPortal(ser);
            card.innerHTML = `
                <img src="${ser.img}">
                <div class="card-desc">
                    <h2 class="rgb-titulo">Zona: ${ser.nombre}</h2>
                    <p style="color:var(--gold); font-size: 0.8rem; letter-spacing: 2px;">PRESIONA PARA ENTRAR</p>
                </div>
            `;
            grid.appendChild(card);
        });

        // --- RGB DINÁMICO ---
        setInterval(() => {
            const hue = Math.floor(Math.random() * 360);
            document.querySelectorAll('.rgb-titulo').forEach(el => {
                el.style.color = `hsl(${hue}, 80%, 60%)`;
            });
        }, 1200);

        // --- ESTRELLAS SEGUIDORAS ---
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let points = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => {
            for(let i=0; i<3; i++) points.push({ x: e.clientX, y: e.clientY, vx: (Math.random()-0.5)*3, vy: (Math.random()-0.5)*3, life: 1 });
        });

        function animate() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            points.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                ctx.fillStyle = `rgba(212, 175, 55, ${p.life})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
                if(p.life <= 0) points.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();

        // --- SISTEMA DE VOZ REFORZADO ---
        const synth = window.speechSynthesis;

        function abrirPortal(ser) {
            document.getElementById('p-title').innerText = ser.nombre;
            document.getElementById('p-info').innerText = ser.info;
            document.getElementById('p-img').src = ser.img;
            document.getElementById('portal').style.display = 'block';
            document.body.style.overflow = 'hidden';
            synth.cancel(); // Detener cualquier audio previo
        }

        function cerrarPortal() {
            synth.cancel();
            document.getElementById('portal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function reproducirVoz() {
            synth.cancel(); // Limpiar cola de voz
            const texto = document.getElementById('p-info').innerText;
            const mensaje = new SpeechSynthesisUtterance(texto);
            mensaje.lang = 'es-MX';
            mensaje.rate = 0.9;
            mensaje.pitch = 1;

            const btn = document.querySelector('.btn-audio');
            mensaje.onstart = () => btn.innerHTML = "<span>🔊</span> NARRANDO...";
            mensaje.onend = () => btn.innerHTML = "<span>🔊</span> REINICIAR NARRACIÓN";

            // El truco para Chrome: disparar la voz después de un micro-retraso
            setTimeout(() => {
                synth.speak(mensaje);
            }, 50);
        }

        // DESBLOQUEADOR DE AUDIO: Activa el motor de voz al primer toque del usuario
        document.body.addEventListener('click', () => {
            const desbloqueo = new SpeechSynthesisUtterance('');
            synth.speak(desbloqueo);
        }, { once: true });

    </script>
</body>
</html>
