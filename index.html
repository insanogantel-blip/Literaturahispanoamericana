<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivo: Literatura Hispanoamericana</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;1,400&family=Quicksand:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --deep-black: #020202;
            --soft-black: #0a0a0a;
            --rgb-speed: 1.5s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--deep-black);
            color: #ffffff;
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
            cursor: cell;
        }

        /* 1, 8. TÍTULOS RGB */
        .rgb-titulo {
            font-family: 'Cinzel Decorative', cursive;
            transition: color var(--rgb-speed) linear;
            text-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        /* 2. ESTRELLAS SEGUIDORAS */
        #star-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        /* 3, 9. DISEÑO CABECERA PROFESIONAL */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #111 0%, var(--deep-black) 100%);
            border-bottom: 1px solid #222;
        }

        .main-title {
            font-size: clamp(2rem, 10vw, 6rem);
            letter-spacing: 12px;
            margin-bottom: 10px;
        }

        .jorge-signature {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: var(--gold);
            letter-spacing: 5px;
            border-top: 1px solid var(--gold);
            padding-top: 15px;
            margin-top: 20px;
        }

        /* 4, 10. ZONAS Y RESPONSIVE */
        .archivo-contenedor {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 5%;
        }

        .seccion-label {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            color: var(--gold);
            text-align: center;
            margin-bottom: 60px;
            letter-spacing: 4px;
        }

        .grid-zonas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
        }

        .zona-card {
            background: var(--soft-black);
            border: 1px solid #1a1a1a;
            position: relative;
            overflow: hidden;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .zona-card:hover {
            transform: translateY(-20px);
            border-color: var(--gold);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
        }

        .zona-card img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.2);
            transition: 0.8s;
        }

        .zona-card:hover img {
            filter: grayscale(0%) contrast(1);
            transform: scale(1.1);
        }

        .card-desc {
            padding: 30px;
            text-align: center;
            background: linear-gradient(to top, var(--soft-black), transparent);
        }

        /* 6. MODAL (PORTAL DE INFORMACIÓN) */
        .portal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--deep-black);
            z-index: 10000;
            display: none;
            overflow-y: auto;
            padding: 60px 10%;
        }

        .portal-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .portal-texto h1 { font-family: 'Cinzel', serif; font-size: 3.5rem; margin-bottom: 25px; }
        .portal-texto p { font-family: 'Lora', serif; font-size: 1.4rem; line-height: 2; color: #ccc; }

        .btn-audio {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 20px 45px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }

        .btn-audio:hover { background: #fff; box-shadow: 0 0 25px #fff; }

        .btn-cerrar {
            position: fixed;
            top: 40px; right: 50px;
            color: #ff4444;
            font-size: 1.5rem;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            z-index: 11000;
        }

        @media (max-width: 900px) {
            .portal-layout { grid-template-columns: 1fr; }
            .portal-texto h1 { font-size: 2.2rem; }
            .btn-cerrar { right: 20px; top: 20px; }
        }
    </style>
</head>
<body>

    <canvas id="star-canvas"></canvas>

    <header>
        <h1 class="main-title rgb-titulo">Literatura Hispanoamericana</h1>
        <p class="jorge-signature">Creado por Jorge</p>
        <div style="margin-top: 40px; font-size: 0.7rem; color: #444; letter-spacing: 3px;">HAZ CLIC PARA DESBLOQUEAR EL AUDIO</div>
    </header>

    <main class="archivo-contenedor">
        <h2 class="seccion-label">ARCHIVO DE SERES Y CRÓNICAS EXTRAÑAS</h2>
        <div class="grid-zonas" id="grid"></div>
    </main>

    <div id="portal" class="portal">
        <span class="btn-cerrar" onclick="cerrarPortal()">[ CERRAR ARCHIVO ]</span>
        <div class="portal-layout">
            <div class="portal-media">
                <img id="p-img" src="" style="width: 100%; border: 1px solid #333; box-shadow: 0 0 50px #000;">
            </div>
            <div class="portal-texto">
                <h1 id="p-title" class="rgb-titulo"></h1>
                <p id="p-info"></p>
                <button class="btn-audio" onclick="reproducirVoz()">
                    <span id="speaker-icon">🔊</span> INICIAR NARRACIÓN DE LA ZONA
                </button>
            </div>
        </div>
    </div>

    <iframe style="display:none" src="https://www.youtube.com/embed/P_NfP0-F_mU?autoplay=1&loop=1"></iframe>

    <script>
        // --- BASE DE DATOS EXTENSA (20 SERES) ---
        const BASE_DATOS = [
            {
                nombre: "El Mohán",
                info: "El Mohán es el guardián de los ríos y tesoros ocultos en las profundidades. Se describe como un anciano de piel cobriza, largos cabellos y ojos ígneos. Habita en cuevas de cristal. En la literatura, representa el espíritu salvaje de la naturaleza y el recordatorio de las culturas precolombinas que aún respiran bajo el agua.",
                img: "https://images.unsplash.com/photo-1549880338-65ddcdfd017b?w=800"
            },
            {
                nombre: "La Llorona",
                info: "Figura arquetípica del dolor hispanoamericano. Su lamento nocturno es un eco de la culpa y la tragedia colonial. Es una mujer espectral que busca a sus hijos por las riberas de los ríos, simbolizando la pérdida de la identidad y el sufrimiento eterno.",
                img: "https://images.unsplash.com/photo-1509248961158-e54f6934749c?w=800"
            },
            {
                nombre: "La Patasola",
                info: "Habitante de las selvas vírgenes, es una mujer de una sola pierna que termina en pezuña. Protege los bosques de los taladores y cazadores. Representa la furia de la naturaleza contra el hombre que busca destruir el equilibrio ecológico.",
                img: "https://images.unsplash.com/photo-1440688807730-73e4e2169fb8?w=800"
            },
            {
                nombre: "El Sombrerón",
                info: "Pequeño ser de la tradición mexicana y guatemalteca que viste de negro con un sombrero gigante. Trenza el pelo de las mujeres y las mulas. Representa el erotismo prohibido y el misterio de las serenatas nocturnas.",
                img: "https://images.unsplash.com/photo-1501430654243-c934cec2e1c0?w=800"
            },
            {
                nombre: "El Silbón",
                info: "Espectro de los llanos colombo-venezolanos. Un gigante que carga un saco de huesos y emite un silbido rítmico. Su presencia es señal de muerte inminente. Personifica el castigo a la falta de respeto hacia los padres.",
                img: "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=800"
            },
            {
                nombre: "El Chupacabras",
                info: "Mito moderno que fusiona la criptozoología con el terror contemporáneo. Surgido en las zonas rurales de Puerto Rico y extendido por todo el continente. Representa el miedo a lo desconocido en la oscuridad.",
                img: "https://images.unsplash.com/photo-1516339901600-2e1a62dc0c45?w=800"
            },
            {
                nombre: "La Sayona",
                info: "Espíritu venezolano que castiga a los hombres infieles. Aparece como una mujer de belleza deslumbrante que muestra su rostro de calavera al final. Es el símbolo del orden moral y el horror.",
                img: "https://images.unsplash.com/photo-1502602894657-3e917240017c?w=800"
            },
            {
                nombre: "El Trauco",
                info: "Criatura de la mitología chilena (Chiloé). Un ser pequeño y deforme que posee una mirada magnética capaz de encantar a las mujeres. Representa la fuerza indomable de la selva fría.",
                img: "https://images.unsplash.com/photo-1448375240586-882707db888b?w=800"
            },
            {
                nombre: "La Ciguapa",
                info: "Mujeres hermosas de República Dominicana con los pies hacia atrás para confundir a sus perseguidores. Viven en las montañas y encarnan la libertad indomable y mística.",
                img: "https://images.unsplash.com/photo-1520262454473-a1a82276a574?w=800"
            },
            {
                nombre: "El Cadejo",
                info: "Perros espectrales de Centroamérica: el blanco que protege y el negro que acecha. Representan la eterna dualidad entre la protección y la perdición en los caminos solitarios.",
                img: "https://images.unsplash.com/photo-1555685812-4b943f1cb0eb?w=800"
            },
            {
                nombre: "El Pombero",
                info: "Duende de la mitología guaraní que protege el monte. Para ganarse su favor se le ofrecen tabaco y miel. Es el dueño de los pájaros y del silencio nocturno.",
                img: "https://images.unsplash.com/photo-1511497584788-876760111969?w=800"
            },
            {
                nombre: "La Madre del Agua",
                info: "Ninfa de cabellos dorados que habita en los manantiales. Representa la pureza y la fertilidad del agua, pero puede ahogar a quienes contaminan sus fuentes.",
                img: "https://images.unsplash.com/photo-1500375592092-40eb2168fd21?w=800"
            },
            {
                nombre: "El Hojarasquín",
                info: "Ser compuesto de ramas y hojas secas de los bosques colombianos. Ayuda a los viajeros respetuosos pero pierde para siempre a quienes talan árboles sin permiso.",
                img: "https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?w=800"
            },
            {
                nombre: "El Tío de la Mina",
                info: "Deidad andina que gobierna las profundidades. Los mineros le dejan ofrendas de coca y licor para que les permita extraer mineral sin peligro.",
                img: "https://images.unsplash.com/photo-1519213123308-073105574384?w=800"
            },
            {
                nombre: "El Basilisco",
                info: "Híbrido de serpiente y gallo de la mitología chilena. Su mirada es letal. Nace de un huevo puesto por un gallo viejo en un establo sucio.",
                img: "https://images.unsplash.com/photo-1534802046520-4f27db7f3ae5?w=800"
            },
            {
                nombre: "La Tunda",
                info: "Mujer con una pata de madera (molinillo) que atrae a los niños con camarones cocinados en el monte. Es una figura de respeto en el pacífico colombo-ecuatoriano.",
                img: "https://images.unsplash.com/photo-1502082553048-f009c37129b9?w=800"
            },
            {
                nombre: "El Cuchivilu",
                info: "Mito marino que es mitad cerdo y mitad serpiente. Destruye los corrales de pesca en las costas y es símbolo de desgracia para los marineros.",
                img: "https://images.unsplash.com/photo-1516466723877-e4ec1d736c8a?w=800"
            },
            {
                nombre: "La Mancarita",
                info: "Ser velludo que camina con los pies al revés por las selvas de los llanos. Rapta personas por soledad, buscando compañía en lo profundo del bosque.",
                img: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=800"
            },
            {
                nombre: "El Invunche",
                info: "Guardián de las cuevas de brujos. Un ser humano modificado mágicamente que no puede salir de la oscuridad. Representa los secretos prohibidos.",
                img: "https://images.unsplash.com/photo-1518063311540-06a2169c593a?w=800"
            },
            {
                nombre: "La Madremonte",
                info: "Giganta de musgo que rige el clima. Cuando se enfurece, desata tormentas y hace que los ríos borren los caminos de los hombres pecadores.",
                img: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800"
            }
        ];

        // --- GENERADOR DE CONTENIDO ---
        const grid = document.getElementById('grid');
        BASE_DATOS.forEach(ser => {
            const card = document.createElement('div');
            card.className = 'zona-card';
            card.onclick = () => abrirPortal(ser);
            card.innerHTML = `
                <img src="${ser.img}">
                <div class="card-desc">
                    <h2 class="rgb-titulo">Zona: ${ser.nombre}</h2>
                    <p style="color:var(--gold); font-size: 0.8rem; letter-spacing: 2px;">PRESIONA PARA ENTRAR</p>
                </div>
            `;
            grid.appendChild(card);
        });

        // --- RGB DINÁMICO ---
        setInterval(() => {
            const hue = Math.floor(Math.random() * 360);
            document.querySelectorAll('.rgb-titulo').forEach(el => {
                el.style.color = `hsl(${hue}, 80%, 60%)`;
            });
        }, 1200);

        // --- ESTRELLAS SEGUIDORAS ---
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let points = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => {
            for(let i=0; i<3; i++) points.push({ x: e.clientX, y: e.clientY, vx: (Math.random()-0.5)*3, vy: (Math.random()-0.5)*3, life: 1 });
        });

        function animate() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            points.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                ctx.fillStyle = `rgba(212, 175, 55, ${p.life})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
                if(p.life <= 0) points.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();

        // --- SISTEMA DE VOZ ---
        const synth = window.speechSynthesis;

        function abrirPortal(ser) {
            document.getElementById('p-title').innerText = ser.nombre;
            document.getElementById('p-info').innerText = ser.info;
            document.getElementById('p-img').src = ser.img;
            document.getElementById('portal').style.display = 'block';
            document.body.style.overflow = 'hidden';
            synth.cancel();
        }

        function cerrarPortal() {
            synth.cancel();
            document.getElementById('portal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function reproducirVoz() {
            synth.cancel();
            const texto = document.getElementById('p-info').innerText;
            const mensaje = new SpeechSynthesisUtterance(texto);
            mensaje.lang = 'es-MX';
            mensaje.rate = 0.9;
            const btn = document.querySelector('.btn-audio');
            mensaje.onstart = () => btn.innerHTML = "<span>🔊</span> NARRANDO...";
            mensaje.onend = () => btn.innerHTML = "<span>🔊</span> REINICIAR NARRACIÓN";
            setTimeout(() => { synth.speak(mensaje); }, 50);
        }

        document.body.addEventListener('click', () => {
            synth.speak(new SpeechSynthesisUtterance(''));
        }, { once: true });
    </script>
</body>
</html>
